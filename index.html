<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Country &mdash; Game</title>
    <meta property="og:image" content="img/main.png" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://bmi-luka-calc.netlify.app/" />
    <meta property="og:title" content="Try out your knowledge of Geography" />
    <meta property="og:description" content="Do you know which of 2 random country has a higher population?" />
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/queries.css" />
    <link rel="manifest" href="/manifest/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="img/logo.png" />
    <link rel="icon" href="img/logo.png" />
  </head>
  <body>
    <header>
      <h1>Which country has more population?</h1>
    </header>
    <main>
      <div class="container">
        <div class="country-l__main">
          <div class="country-l__helper"></div>
          <p class="l-name country-name"></p>
        </div>
        <div class="res-box">
          <div class="result">
            <p class="game-score">Score: 3</p>
          </div>
          <div class="result">
            <p class="game-answer">Correct!</p>
          </div>
        </div>
        <div class="country-r__main">
          <p class="r-name country-name mobile-name"></p>
          <div class="country-r__helper"></div>
          <p class="r-name country-name desktop-name"></p>
        </div>
      </div>
    </main>
  </body>
  <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
  <script src="js/script.js"></script>
</html>
